name: portal-rollout-gate

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_v2_clean_state_smoke:
        description: 'Run manual post-reset V2 clean-state smoke checks'
        required: false
        default: false
        type: boolean

jobs:
  rollout-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backend lint/build
        run: |
          npm run lint --workspace=apps/backend
          npm run build --workspace=apps/backend

      - name: Portal lint/build
        run: |
          npm run lint --workspace=apps/client-portal
          npm run build --workspace=apps/client-portal

      - name: Local reliability checks
        run: |
          npm run check:runtime-config --workspace=apps/backend
          npm run test:chat-runtime-engine --workspace=apps/backend
          npm run test:runtime-reliability-r1 --workspace=apps/backend
          npm run test-document-generation-quality --workspace=apps/backend
          npm run test:deliverable-engine-regression --workspace=apps/backend
          npm run test:deep-pro-iteration-regression --workspace=apps/backend
          npm run test:client-right-rail-regression --workspace=apps/backend
        env:
          PORTAL_E2E_BASE_URL: ${{ secrets.PORTAL_E2E_BASE_URL }}

      - name: Online portal auth runtime e2e
        if: ${{ vars.PORTAL_ENABLE_RUNTIME_E2E == 'true' && secrets.PORTAL_E2E_BASE_URL != '' }}
        run: npm run test:portal-auth-runtime-e2e --workspace=apps/backend
        env:
          PORTAL_E2E_BASE_URL: ${{ secrets.PORTAL_E2E_BASE_URL }}

      - name: Online portal auth smoke
        run: npm run test:portal-ui-auth-flow:online --workspace=apps/backend
        env:
          PORTAL_UI_E2E_BASE_URL: ${{ secrets.PORTAL_UI_E2E_BASE_URL }}

      - name: Online runtime smoke
        run: npm run test:r1-online-smoke --workspace=apps/backend
        env:
          R1_BASE_URL: ${{ secrets.PORTAL_E2E_BASE_URL }}
          R1_ADMIN_EMAIL: ${{ secrets.R1_ADMIN_EMAIL }}
          R1_ADMIN_PASSWORD: ${{ secrets.R1_ADMIN_PASSWORD }}
          R1_WORKSPACE_ID: ${{ secrets.R1_WORKSPACE_ID }}
          R1_TEST_SCAN_URL: ${{ vars.R1_TEST_SCAN_URL }}

      - name: Online ChatGPT parity smoke
        run: npm run test:online-chatgpt-parity-smoke --workspace=apps/backend
        env:
          CHATGPT_PARITY_BASE_URL: ${{ secrets.PORTAL_E2E_BASE_URL }}
          R1_ADMIN_EMAIL: ${{ secrets.R1_ADMIN_EMAIL }}
          R1_ADMIN_PASSWORD: ${{ secrets.R1_ADMIN_PASSWORD }}
          R1_WORKSPACE_ID: ${{ secrets.R1_WORKSPACE_ID }}

      - name: Rollout readiness preflight
        run: npm run check:portal-rollout --workspace=apps/backend | tee portal-rollout-readiness.json
        env:
          BACKEND_BASE_URL: ${{ secrets.PORTAL_E2E_BASE_URL }}
          PORTAL_E2E_BASE_URL: ${{ secrets.PORTAL_E2E_BASE_URL }}
          PORTAL_UI_E2E_BASE_URL: ${{ secrets.PORTAL_UI_E2E_BASE_URL }}
          PORTAL_EMAIL_VERIFY_CODE: ${{ secrets.PORTAL_EMAIL_VERIFY_CODE }}
          PORTAL_SIGNUP_SCAN_MODE: ${{ vars.PORTAL_SIGNUP_SCAN_MODE }}
          PORTAL_SIGNUP_DDG_ENABLED: ${{ vars.PORTAL_SIGNUP_DDG_ENABLED }}

      - name: Upload readiness summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portal-rollout-readiness
          path: portal-rollout-readiness.json

  ops-v2-clean-state-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_v2_clean_state_smoke == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: V2 clean-state smoke
        run: npm run test:v2-clean-state-smoke --workspace=apps/backend
        env:
          V2_BASE_URL: ${{ secrets.PORTAL_E2E_BASE_URL }}
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_PUBLIC_URL }}
